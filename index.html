<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --panel: #0f1219;
            --accent: #f59e0b; /* Amber */
            --danger: #ff2a6d; /* Neon Red */
            --success: #05ffa1; /* Electric Green */
            --bt: #007aff;
            --border: rgba(255, 255, 255, 0.05);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: var(--font);
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* RESPONSIVE GRID SYSTEM */
        .app-container {
            display: grid;
            grid-template-columns: 350px 1fr 320px;
            gap: 20px;
            padding: 20px;
            height: 100vh;
        }

        /* MOBILE VIEW ADJUSTMENTS */
        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
                padding: 15px;
                padding-top: 80px; /* Space for mobile header */
            }
            .side-panel { height: auto !important; border-radius: 20px; }
            .center-panel { min-height: 500px; order: -1; } /* Knob comes first on mobile */
            .mobile-header { display: flex !important; }
        }

        /* MOBILE HEADER */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(15, 18, 25, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
            align-items: center;
        }

        .side-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* COMPONENT STYLES */
        .ui-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #4b5563; text-transform: uppercase; }
        
        .glass-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
        }

        .val-text { font-family: 'JetBrains Mono'; font-size: 32px; color: var(--accent); }

        input[type=range] {
            width: 100%; height: 8px; appearance: none; background: #1a1e26; border-radius: 10px; margin-top: 15px;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #fff; cursor: pointer;
            box-shadow: 0 0 20px var(--accent);
        }

        /* BLUETOOTH SWITCH */
        .bt-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 122, 255, 0.1);
            padding: 15px 20px; border-radius: 15px; cursor: pointer;
            border: 1px solid rgba(0, 122, 255, 0.2);
        }
        .bt-row.active { background: var(--bt); border-color: #fff; }

        /* THE KNOB VISUALIZER */
        .center-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .knob-outer {
            width: min(80vw, 360px); 
            height: min(80vw, 360px);
            background: radial-gradient(circle at 30% 30%, #1a1e26, #05070a);
            border-radius: 50%;
            border: 8px solid #11151c;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 40px #000;
        }

        .needle {
            width: 8px; height: 35%;
            background: linear-gradient(to top, var(--accent), #fff);
            position: absolute; top: 15%; border-radius: 10px;
            transform-origin: bottom center;
            box-shadow: 0 0 20px var(--accent);
        }
        .needle.danger { background: var(--danger); box-shadow: 0 0 30px var(--danger); transform: rotate(-90deg) !important; }

        .status-badge {
            margin-top: 30px; padding: 12px 30px; border-radius: 100px;
            font-size: 11px; font-weight: 800; letter-spacing: 2px;
            border: 1px solid var(--success); color: var(--success);
        }
        .status-badge.alarm { border-color: var(--danger); color: var(--danger); background: rgba(255,42,109,0.1); animation: pulse 0.6s infinite alternate; }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

        /* PRESET BUTTONS */
        .preset-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .preset-btn {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px;
            border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 15px;
        }
        .preset-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        /* CONSOLE */
        .console {
            background: #000; border-radius: 20px; padding: 15px;
            flex-grow: 1; font-family: 'JetBrains Mono'; font-size: 10px;
            color: var(--success); overflow-y: auto; border: 1px solid var(--border);
            max-height: 200px;
        }

    </style>
</head>
<body>

<header class="mobile-header">
    <div style="font-weight: 800; font-size: 14px; letter-spacing: 1px;">SAFETY COMMAND</div>
    <div id="bt-dot" style="width: 10px; height: 10px; border-radius: 50%; background: #333;"></div>
</header>

<div class="app-container">
    
    <aside class="side-panel">
        <div class="ui-label">Connection</div>
        <div class="bt-row" id="bt-trigger" onclick="toggleBT()">
            <span style="font-size: 13px; font-weight: 700;">Bluetooth Link</span>
            <div id="bt-icon" style="opacity: 0.3;">📡</div>
        </div>

        <div class="glass-card">
            <div class="ui-label">Gas Level</div>
            <div class="val-text" id="g-num">120</div>
            <input type="range" id="g-slider" min="0" max="1000" value="120">
        </div>

        <div class="glass-card">
            <div class="ui-label">Temperature</div>
            <div class="val-text" id="t-num">28</div>
            <input type="range" id="t-slider" min="20" max="150" value="28">
        </div>
    </aside>

    <main class="center-panel">
        <div class="knob-outer">
            <div class="needle" id="needle"></div>
            <div style="font-weight: 900; letter-spacing: 2px; color: #374151;" id="center-label">MONITORING</div>
        </div>
        <div class="status-badge" id="badge">SYSTEM SECURE</div>
    </main>

    <aside class="side-panel">
        <div class="ui-label">Presets</div>
        <div class="preset-grid">
            <div class="preset-btn" onclick="apply(700, 30)">
                <span>💨</span>
                <div style="font-size: 12px; font-weight: 600;">Simulate Gas Leak</div>
            </div>
            <div class="preset-btn" onclick="apply(100, 110)">
                <span>🔥</span>
                <div style="font-size: 12px; font-weight: 600;">Simulate Overheat</div>
            </div>
            <div class="preset-btn" onclick="apply(50, 25)" style="border-color: var(--success);">
                <span>🔄</span>
                <div style="font-size: 12px; font-weight: 600; color: var(--success);">Reset System</div>
            </div>
        </div>

        <div class="ui-label">Live Logs</div>
        <div class="console" id="logs">
            > System Ready...<br>
            > Awaiting connection...
        </div>
    </aside>

</div>

<script>
    const gS = document.getElementById('g-slider');
    const tS = document.getElementById('t-slider');
    const needle = document.getElementById('needle');
    const badge = document.getElementById('badge');
    const logs = document.getElementById('logs');
    const btTrigger = document.getElementById('bt-trigger');
    const btDot = document.getElementById('bt-dot');

    let safe = true;
    let btActive = false;

    function addLog(msg, isErr = false) {
        const color = isErr ? "var(--danger)" : "var(--success)";
        logs.innerHTML = `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>` + logs.innerHTML;
    }

    function toggleBT() {
        btActive = !btActive;
        btTrigger.classList.toggle('active', btActive);
        btDot.style.background = btActive ? "var(--bt)" : "#333";
        btDot.style.boxShadow = btActive ? "0 0 10px var(--bt)" : "none";
        addLog(btActive ? "BT: Link Established" : "BT: Link Severed");
    }

    function apply(g, t) {
        gS.value = g;
        tS.value = t;
        update();
    }

    function update() {
        const g = parseInt(gS.value);
        const t = parseInt(tS.value);

        document.getElementById('g-num').innerText = g;
        document.getElementById('t-num').innerText = t;

        const hazard = g > 400 || t > 80;

        if (safe && hazard) {
            safe = false;
            needle.classList.add('danger');
            badge.innerText = "EMERGENCY SHUTDOWN";
            badge.classList.add('alarm');
            document.getElementById('center-label').innerText = "HALT";
            document.getElementById('center-label').style.color = "var(--danger)";
            addLog("!! CRITICAL HAZARD !!", true);
            addLog("Servo command sent: 90°", true);
            if(btActive) addLog("Cloud Alert: Sent to Mobile", false);
        } 
        else if (!safe && g < 200 && t < 45) {
            safe = true;
            needle.classList.remove('danger');
            badge.innerText = "SYSTEM SECURE";
            badge.classList.remove('alarm');
            document.getElementById('center-label').innerText = "MONITORING";
            document.getElementById('center-label').style.color = "#374151";
            addLog("Safety Restored. System Reset.");
        }
    }

    gS.oninput = update;
    tS.oninput = update;
</script>

</body>
</html>
