<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartKnob Pro | Safety Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.4);
            --danger: #ff4b2b;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- STICKY NAV BAR --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav-brand { font-weight: 800; font-size: 1.4rem; letter-spacing: 1px; color: var(--accent); }
        
        .sim-toggle-btn {
            background: linear-gradient(45deg, var(--accent), #4facfe);
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .hero h1 { font-size: clamp(3rem, 8vw, 6rem); margin: 0; line-height: 1; }
        .hero p { color: #888; font-size: 1.2rem; margin: 20px 0 40px; }

        /* --- SIMULATOR OVERLAY --- */
        #simulator-ui {
            display: none;
            padding: 120px 5% 60px;
            min-height: 100vh;
            background: #0a0a0a;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1300px;
            margin: auto;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* --- SMART KNOB VISUALIZER --- */
        .knob-visual {
            width: 220px; height: 220px;
            margin: 40px auto;
            background: #111;
            border: 15px solid #222;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px #000;
        }

        .knob-handle {
            width: 10px; height: 80px;
            background: var(--accent);
            position: absolute; top: 20px;
            border-radius: 5px;
            transform-origin: bottom center;
            box-shadow: 0 0 15px var(--accent);
        }

        /* --- SLIDER STYLING --- */
        .sensor-control { margin-top: 25px; }
        .sensor-control label { display: flex; justify-content: space-between; margin-bottom: 10px; color: #aaa; }
        
        input[type=range] {
            width: 100%; appearance: none; background: #222; height: 10px; border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 25px; height: 25px; background: var(--accent); border-radius: 50%; cursor: pointer;
        }

        /* --- LOGS --- */
        .terminal {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            color: #00ff00;
            font-size: 0.85rem;
            border: 1px solid #111;
        }

        /* --- ALERTS --- */
        .alert-banner {
            grid-column: 1 / -1;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            font-weight: 700;
            display: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .active-alert { background: var(--danger); color: white; display: block; animation: flash 1s infinite; }

        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <nav>
        <div class="nav-brand">KNOB.OS</div>
        <button class="sim-toggle-btn" onclick="openSim()">LAUNCH SIMULATOR</button>
    </nav>

    <section class="hero" id="home">
        <h1>Safety by <span style="color:var(--accent)">Design.</span></h1>
        <p>The next generation of kitchen safety. Intelligent. Retrofit. Life-saving.</p>
    </section>

    <section id="simulator-ui">
        <div id="alert-zone" class="alert-banner">Emergency Shutoff Engaged</div>

        <div class="dashboard-grid">
            
            <div class="glass-card" style="text-align: center;">
                <h3 style="margin-top:0">Device Feedback</h3>
                <div class="knob-visual" id="main-knob">
                    <div class="knob-handle" id="handle"></div>
                </div>
                <div id="status-tag" style="color:var(--accent); font-weight: bold;">STATUS: STANDBY</div>
            </div>

            <div class="glass-card">
                <h3 style="margin-top:0">Sensor Overrides</h3>
                
                <div class="sensor-control">
                    <label><span>LPG Gas Levels</span> <b id="gas-val">120 PPM</b></label>
                    <input type="range" id="gas-range" min="0" max="1000" value="120">
                </div>

                <div class="sensor-control">
                    <label><span>Ambient Temperature</span> <b id="temp-val">28 °C</b></label>
                    <input type="range" id="temp-range" min="20" max="150" value="28">
                </div>

                <div class="sensor-control">
                    <label><span>Shutoff Timer (Minutes)</span> <b id="time-val">0</b></label>
                    <input type="range" id="time-range" min="0" max="60" value="0">
                </div>
            </div>

            <div class="glass-card">
                <h3 style="margin-top:0">Event History</h3>
                <div class="terminal" id="term-log">
                    > System Kernel 1.0.4 loaded...<br>
                    > Monitoring active...
                </div>
                <button onclick="toggleBT()" id="bt-btn" style="width: 100%; margin-top: 15px; padding: 10px; border-radius: 10px; border: 1px solid var(--accent); background: none; color: var(--accent); cursor:pointer;">
                    Pair Smartphone App
                </button>
            </div>

        </div>
    </section>

    <script>
        const gasRange = document.getElementById('gas-range');
        const tempRange = document.getElementById('temp-range');
        const timeRange = document.getElementById('time-range');
        const handle = document.getElementById('handle');
        const statusTag = document.getElementById('status-tag');
        const alertZone = document.getElementById('alert-zone');
        const log = document.getElementById('term-log');

        let isEmergency = false;
        let btOn = false;

        function addLog(msg) {
            log.innerHTML = `> ${msg}<br>` + log.innerHTML;
        }

        function openSim() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('simulator-ui').style.display = 'block';
            addLog("Simulation Interface Ready.");
        }

        function toggleBT() {
            btOn = !btOn;
            document.getElementById('bt-btn').innerText = btOn ? "APP CONNECTED ✅" : "PAIR SMARTPHONE APP";
            addLog(btOn ? "Bluetooth Handshake Complete." : "Bluetooth Link Severed.");
        }

        function runLogic() {
            const gas = parseInt(gasRange.value);
            const temp = parseInt(tempRange.value);
            const time = parseInt(timeRange.value);

            document.getElementById('gas-val').innerText = `${gas} PPM`;
            document.getElementById('temp-val').innerText = `${temp} °C`;
            document.getElementById('time-val').innerText = `${time} Min`;

            // Threshold Logic
            if (!isEmergency && (gas > 450 || temp > 85)) {
                isEmergency = true;
                handle.style.transform = "rotate(-90deg)";
                statusTag.innerText = "STATUS: SHUTOFF ENGAGED";
                statusTag.style.color = "var(--danger)";
                alertZone.classList.add('active-alert');
                
                addLog("<span style='color:red'>!! CRITICAL ALERT: THRESHOLD EXCEEDED !!</span>");
                addLog("Executing Mechanical Rotation...");
                if(btOn) addLog("Pushing Alert to Smartphone...");
            } 
            else if (isEmergency && gas < 200 && temp < 40) {
                isEmergency = false;
                handle.style.transform = "rotate(0deg)";
                statusTag.innerText = "STATUS: STANDBY";
                statusTag.style.color = "var(--accent)";
                alertZone.classList.remove('active-alert');
                addLog("System cooling... Safety reset performed.");
            }
        }

        gasRange.oninput = runLogic;
        tempRange.oninput = runLogic;
        timeRange.oninput = runLogic;

    </script>
</body>
</html>
