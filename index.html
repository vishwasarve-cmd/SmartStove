<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Safety Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --panel: rgba(18, 22, 30, 0.7);
            --accent: #e2b714; /* Luxury Gold */
            --danger: #ff2a6d; /* Neon Crimson */
            --success: #05ffa1; /* Electric Green */
            --border: rgba(255, 255, 255, 0.1);
            --font-main: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0d121d 0%, #030406 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* RESPONSIVE GRID */
        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 1100px) {
            .dashboard { grid-template-columns: 1fr; height: auto; padding: 10px; }
            .side-panel { height: auto !important; order: 2; }
            .center-view { order: 1; height: 80vh !important; }
        }

        .side-panel {
            background: var(--panel);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* CENTER STAGE */
        .center-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hardware-circle {
            width: 340px; height: 340px;
            background: linear-gradient(145deg, #0f131a, #05070a);
            border-radius: 50%;
            border: 4px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,1);
        }

        /* 3D KNOB EFFECT */
        .knob-cap {
            width: 260px; height: 260px;
            background: #151a24;
            border-radius: 50%;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5), -5px -5px 15px rgba(255,255,255,0.02);
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .pointer-line {
            width: 8px; height: 100px;
            background: linear-gradient(to top, var(--accent), #fff);
            position: absolute; top: 30px;
            border-radius: 10px;
            transform-origin: bottom center;
            box-shadow: 0 0 20px var(--accent);
        }

        .pointer-line.danger {
            background: linear-gradient(to top, var(--danger), #fff);
            box-shadow: 0 0 30px var(--danger);
            transform: rotate(-90deg) !important;
        }

        /* SLIDERS & CONTROLS */
        .card-ui {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .label { font-size: 11px; letter-spacing: 2px; color: #666; font-weight: 700; margin-bottom: 10px; }
        .val-display { font-size: 32px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

        input[type=range] {
            width: 100%; height: 6px; appearance: none; background: #222; border-radius: 10px; margin-top: 15px;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 0 15px var(--accent);
        }

        /* DYNAMIC BURNERS */
        .burner-row { display: flex; gap: 30px; margin-top: 40px; }
        .burner {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #1a1f2b;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .flame {
            font-size: 24px; filter: drop-shadow(0 0 10px #ff7b00); opacity: 0; transform: scale(0.5);
        }
        .active .flame { opacity: 1; transform: scale(1.1); animation: burn 0.2s infinite alternate; }

        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.15) translateY(-3px); } }

        /* TELEMETRY TERMINAL */
        .terminal {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 15px;
            flex-grow: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--success);
            overflow-y: auto;
            line-height: 1.6;
        }

        .status-badge {
            margin-top: 25px; padding: 10px 30px; border-radius: 50px;
            font-weight: 700; letter-spacing: 2px; font-size: 12px;
            border: 1px solid var(--success); color: var(--success);
        }
        .status-badge.red { border-color: var(--danger); color: var(--danger); background: rgba(255,42,109,0.1); animation: blink 0.8s infinite alternate; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }

    </style>
</head>
<body>

<div class="dashboard">
    
    <aside class="side-panel">
        <div class="card-ui">
            <div class="label">MQ-2 GAS SENSOR</div>
            <div class="val-display" id="g-num">120</div>
            <input type="range" id="g-slider" min="0" max="1000" value="120">
            <div style="font-size: 10px; color: #444; margin-top: 8px;">THRESHOLD: 400 PPM</div>
        </div>

        <div class="card-ui">
            <div class="label">LM35 TEMPERATURE</div>
            <div class="val-display" id="t-num">28</div>
            <input type="range" id="t-slider" min="20" max="150" value="28">
            <div style="font-size: 10px; color: #444; margin-top: 8px;">THRESHOLD: 80°C</div>
        </div>

        <div style="margin-top: auto;">
            <div class="label">SCENARIO TESTING</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button onclick="apply(600, 30)" style="background: none; border: 1px solid #333; color: #888; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 11px;">GAS LEAK</button>
                <button onclick="apply(100, 110)" style="background: none; border: 1px solid #333; color: #888; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 11px;">OVERHEAT</button>
                <button onclick="apply(50, 25)" style="background: none; border: 1px solid var(--success); color: var(--success); padding: 8px; border-radius: 10px; cursor: pointer; font-size: 11px; grid-column: span 2;">RESET SYSTEM</button>
            </div>
        </div>
    </aside>

    <main class="center-view">
        <div class="hardware-circle">
            <div class="knob-cap">
                <div class="pointer-line" id="pointer"></div>
                <div style="font-weight: 700; font-size: 1.5rem; letter-spacing: 2px;" id="cap-text">ACTIVE</div>
            </div>
        </div>

        <div class="status-badge" id="main-status">SYSTEM SECURE</div>

        <div class="burner-row">
            <div class="burner active" id="b1"><span class="flame">🔥</span></div>
            <div class="burner active" id="b2"><span class="flame">🔥</span></div>
            <div class="burner active" id="b3"><span class="flame">🔥</span></div>
        </div>
    </main>

    <aside class="side-panel">
        <div class="label">LIVE TELEMETRY</div>
        <div class="terminal" id="term">
            > KERNEL BOOT SUCCESS...<br>
            > SENSORS STABILIZED...<br>
            > AWAITING DATA...
        </div>

        <div class="card-ui" style="margin-top: auto;">
            <div class="label">REMOTE STATUS</div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow: 0 0 10px var(--success);"></div>
                <span style="font-family: 'JetBrains Mono'; font-size: 12px;">APP CONNECTED</span>
            </div>
        </div>
    </aside>

</div>

<script>
    const gS = document.getElementById('g-slider');
    const tS = document.getElementById('t-slider');
    const ptr = document.getElementById('pointer');
    const capTxt = document.getElementById('cap-text');
    const status = document.getElementById('main-status');
    const term = document.getElementById('term');

    let safe = true;

    function log(msg, err = false) {
        const color = err ? "var(--danger)" : "var(--success)";
        term.innerHTML = `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>` + term.innerHTML;
    }

    function apply(g, t) {
        gS.value = g;
        tS.value = t;
        run();
    }

    function run() {
        const g = parseInt(gS.value);
        const t = parseInt(tS.value);

        document.getElementById('g-num').innerText = g;
        document.getElementById('t-num').innerText = t;

        const gHz = g > 400;
        const tHz = t > 80;

        if (safe && (gHz || tHz)) {
            safe = false;
            ptr.classList.add('danger');
            capTxt.innerText = "OFF";
            capTxt.style.color = "var(--danger)";
            status.innerText = "CRITICAL HAZARD DETECTED";
            status.classList.add('red');
            document.querySelectorAll('.burner').forEach(b => b.classList.remove('active'));
            
            log("! EMERGENCY SHUTDOWN ACTIVATED !", true);
            log("Servo triggered to -90 degrees", true);
            log("Mobile notification dispatched", false);
        } 
        else if (!safe && g < 200 && t < 45) {
            safe = true;
            ptr.classList.remove('danger');
            capTxt.innerText = "ACTIVE";
            capTxt.style.color = "#fff";
            status.innerText = "SYSTEM SECURE";
            status.classList.remove('red');
            document.querySelectorAll('.burner').forEach(b => b.classList.add('active'));
            log("Environment cleared. System restored.");
        }
    }

    gS.oninput = run;
    tS.oninput = run;
</script>

</body>
</html>
