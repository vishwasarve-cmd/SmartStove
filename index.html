<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Knob Simulation | CIT CSE</title>
    <style>
        :root {
            --danger: #ef4444;
            --safe: #22c55e;
            --primary: #2563eb;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .simulator-container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* Status Section */
        .status-panel {
            text-align: center;
            border-right: 1px solid #334155;
            padding-right: 2rem;
        }

        .knob-visual {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid #475569;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.5s ease;
            position: relative;
        }

        .knob-visual::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 4px;
            height: 40px;
            background: white;
            transition: transform 0.5s;
        }

        .status-on { border-color: var(--safe); color: var(--safe); box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .status-off { border-color: var(--danger); color: var(--danger); }
        .status-off::after { transform: rotate(-90deg); }

        /* Controls Section */
        .control-panel h3 { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }
        
        .slider-group { margin-bottom: 1.5rem; }
        input[type=range] { width: 100%; cursor: pointer; }

        .bt-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }

        .alert-box {
            grid-column: span 2;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="simulator-container">
    <div class="status-panel">
        <h2>Smart Knob V1</h2>
        <div id="knob" class="knob-visual status-on">ON</div>
        <p id="bt-status" style="color: #64748b;">Bluetooth: Disconnected</p>
        <div style="text-align: left; background: #0f172a; padding: 10px; border-radius: 8px;">
            <small>Live Logs:</small>
            <div id="logs" style="font-family: monospace; font-size: 0.8rem; color: #10b981;">> System Initialized...</div>
        </div>
    </div>

    <div class="control-panel">
        <h3>Sensor Simulation</h3>
        
        <div class="slider-group">
            <label>Gas Level (PPM): <span id="gas-val">150</span></label>
            <input type="range" id="gas-slider" min="0" max="1000" value="150">
        </div>

        <div class="slider-group">
            <label>Temperature (°C): <span id="temp-val">45</span></label>
            <input type="range" id="temp-slider" min="20" max="200" value="45">
        </div>

        <div class="slider-group">
            <label>Timer (Minutes): <span id="timer-val">30</span></label>
            <input type="range" id="timer-slider" min="0" max="120" value="30">
        </div>

        <button class="bt-button" onclick="toggleBT()">Connect Bluetooth</button>
    </div>

    <div id="alert" class="alert-box"></div>
</div>

<script>
    const gasSlider = document.getElementById('gas-slider');
    const tempSlider = document.getElementById('temp-slider');
    const knob = document.getElementById('knob');
    const alertBox = document.getElementById('alert');
    const logs = document.getElementById('logs');

    let isConnected = false;
    let systemActive = true;

    function updateLogs(msg) {
        logs.innerHTML = `> ${msg}<br>` + logs.innerHTML;
    }

    function toggleBT() {
        isConnected = !isConnected;
        document.getElementById('bt-status').innerText = isConnected ? "Bluetooth: Connected ✅" : "Bluetooth: Disconnected";
        updateLogs(isConnected ? "BT Paired with Smartphone" : "BT Connection Lost");
    }

    function checkLogic() {
        const gas = parseInt(gasSlider.value);
        const temp = parseInt(tempSlider.value);
        
        document.getElementById('gas-val').innerText = gas;
        document.getElementById('temp-val').innerText = temp;

        // EMERGENCY LOGIC
        if (gas > 600 || temp > 120) {
            systemActive = false;
            knob.className = "knob-visual status-off";
            knob.innerText = "OFF";
            alertBox.style.display = "block";
            alertBox.style.backgroundColor = "#ef4444";
            alertBox.innerText = gas > 600 ? "CRITICAL GAS LEAK DETECTED! AUTO-SHUTOFF ACTIVATED." : "OVERHEATING DETECTED! STOVE KILLED.";
            
            if(isConnected) {
                updateLogs("PUSH NOTIFICATION SENT TO PHONE!");
            }
        } else {
            // Manual Reset Simulation
            if (!systemActive && gas < 200 && temp < 60) {
                systemActive = true;
                knob.className = "knob-visual status-on";
                knob.innerText = "ON";
                alertBox.style.display = "none";
                updateLogs("System Reset: Safe levels restored.");
            }
        }
    }

    gasSlider.oninput = checkLogic;
    tempSlider.oninput = checkLogic;
    document.getElementById('timer-slider').oninput = function() {
        document.getElementById('timer-val').innerText = this.value;
    };
</script>

</body>
</html>
