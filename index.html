<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root {
--bg:#05070a; --panel:#0f1219; --accent:#f59e0b; --danger:#ff2a6d;
--success:#05ffa1; --bt:#007aff; --border:rgba(255,255,255,0.05);
--font:'Plus Jakarta Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:#fff}

.app-container{display:grid;grid-template-columns:350px 1fr 320px;gap:20px;padding:20px;height:100vh}
@media(max-width:1100px){.app-container{grid-template-columns:1fr;height:auto}}

.side-panel{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px}
.glass-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);padding:15px;border-radius:15px;margin-top:10px}
.val-text{font-family:'JetBrains Mono';font-size:28px;color:var(--accent)}

button{padding:10px;border:none;border-radius:10px;cursor:pointer;font-weight:600}
.on{background:var(--success)}
.off{background:var(--danger);color:#fff}

.center-panel{display:flex;flex-direction:column;align-items:center;justify-content:center}
.status{margin-top:20px;font-weight:bold}
.console{background:#000;padding:10px;margin-top:10px;height:150px;overflow:auto;font-size:12px}
input{width:100%;margin-top:10px}
</style>
</head>

<body>
<div class="app-container">

<!-- LEFT -->
<div class="side-panel">
<h3>Controls</h3>

<div class="glass-card">
Gas Level
<div class="val-text" id="g-val">100</div>
<input type="range" id="gas" min="0" max="1000" value="100">
</div>

<div class="glass-card">
Temperature
<div class="val-text" id="t-val">30</div>
<input type="range" id="temp" min="20" max="150" value="30">
</div>

<div class="glass-card">
<h4>Stove Control</h4>
<button class="on" onclick="stoveOn()">ON</button>
<button class="off" onclick="stoveOff()">OFF</button>
</div>

<div class="glass-card">
<h4>Mobile Alert</h4>
<input type="text" id="phone" placeholder="Enter WhatsApp Number">
<button onclick="saveNumber()">Save Number</button>
</div>

</div>

<!-- CENTER -->
<div class="center-panel">
<h1 id="status">SYSTEM SAFE</h1>
<div class="status" id="stove-status">Stove: OFF</div>
</div>

<!-- RIGHT -->
<div class="side-panel">
<h3>Logs</h3>
<div class="console" id="log">System Started...<br></div>
</div>

</div>

<script>
let gas=document.getElementById('gas');
let temp=document.getElementById('temp');
let log=document.getElementById('log');
let phoneNumber="";
let stove=false;

function addLog(msg){
log.innerHTML="["+new Date().toLocaleTimeString()+"] "+msg+"<br>"+log.innerHTML;
}

function stoveOn(){
stove=true;
document.getElementById('stove-status').innerText="Stove: ON";
addLog("Stove turned ON");
}

function stoveOff(){
stove=false;
document.getElementById('stove-status').innerText="Stove: OFF";
addLog("Stove turned OFF");
}

function saveNumber(){
phoneNumber=document.getElementById('phone').value;
addLog("Number saved: "+phoneNumber);
}

function sendWhatsApp(){
if(phoneNumber!==""){
let msg="⚠️ Gas Leak Detected! Please check immediately.";
let url="https://wa.me/"+phoneNumber+"?text="+encodeURIComponent(msg);
window.open(url,'_blank');
addLog("WhatsApp Alert Triggered");
}
}

function check(){
let g=gas.value;
let t=temp.value;
document.getElementById('g-val').innerText=g;
document.getElementById('t-val').innerText=t;

if(g>400 || t>80){
document.getElementById('status').innerText="⚠️ DANGER";
addLog("Hazard Detected!");
stoveOff();
sendWhatsApp();
}else{
document.getElementById('status').innerText="SYSTEM SAFE";
}
}

gas.oninput=check;
temp.oninput=check;
</script>

</body>
</html>
