<script>
const gS = document.getElementById('g-slider');
const tS = document.getElementById('t-slider');
const needle = document.getElementById('needle');
const coreStatus = document.getElementById('core-status');
const sysBadge = document.getElementById('sys-badge');
const logs = document.getElementById('logs');
const btMaster = document.getElementById('bt-master');

let isSafe = true;
let btEnabled = false;
let autoMode = false;
let uptime = 0;
let btDevice = null;

/* ---------- LOG SYSTEM ---------- */
function addLog(msg, type = "info") {
    const colors = {
        info: "#10b981",
        warn: "#f59e0b",
        error: "#ef4444",
        bt: "#3b82f6"
    };
    logs.innerHTML =
        `<span style="color:${colors[type]}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>` +
        logs.innerHTML;
}

/* ---------- BLUETOOTH (REAL + FALLBACK SIMULATION) ---------- */
async function toggleBT() {
    if (!btEnabled) {
        try {
            if (navigator.bluetooth) {
                btDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });
                addLog("Bluetooth Connected: " + btDevice.name, "bt");
            } else {
                addLog("Web Bluetooth not supported (Simulation Mode)", "warn");
            }
            btEnabled = true;
            btMaster.classList.add('active');
        } catch (err) {
            addLog("Bluetooth connection failed", "error");
        }
    } else {
        btEnabled = false;
        btMaster.classList.remove('active');
        btDevice = null;
        addLog("Bluetooth Disconnected", "bt");
    }
}

/* ---------- SENSOR APPLY ---------- */
function apply(g, t) {
    gS.value = g;
    tS.value = t;
    sync();
}

/* ---------- AUTO SIMULATION ---------- */
function toggleAuto() {
    autoMode = !autoMode;
    addLog(autoMode ? "Auto Simulation Enabled" : "Auto Simulation Disabled", "info");

    if (autoMode) simulate();
}

function simulate() {
    if (!autoMode) return;

    let g = Math.floor(Math.random() * 900);
    let t = Math.floor(Math.random() * 130);

    apply(g, t);

    setTimeout(simulate, 2000);
}

/* ---------- MAIN LOGIC ---------- */
function sync() {
    const g = parseInt(gS.value);
    const t = parseInt(tS.value);

    document.getElementById('g-num').innerText = g;
    document.getElementById('t-num').innerText = t;

    /* Smooth needle rotation */
    let angle = (g / 1000) * 180 - 90;
    needle.style.transform = `rotate(${angle}deg)`;

    const warning = g > 300 || t > 60;
    const critical = g > 500 || t > 90;

    if (critical) {
        coreStatus.innerText = "CRITICAL";
        coreStatus.style.color = "var(--danger)";
        sysBadge.innerText = "EMERGENCY SHUTDOWN";
        sysBadge.classList.add('alert');

        document.querySelectorAll('.burner-base').forEach(b => b.classList.remove('active'));

        addLog("CRITICAL CONDITION TRIGGERED", "error");
        if (btEnabled) addLog("Alert sent via Bluetooth", "bt");
    }
    else if (warning) {
        coreStatus.innerText = "WARNING";
        coreStatus.style.color = "var(--accent)";
        sysBadge.innerText = "SYSTEM WARNING";
        sysBadge.classList.remove('alert');

        addLog("Warning: Threshold approaching", "warn");
    }
    else {
        coreStatus.innerText = "STABLE";
        coreStatus.style.color = "#fff";
        sysBadge.innerText = "SYSTEM SECURE";
        sysBadge.classList.remove('alert');

        document.querySelectorAll('.burner-base').forEach(b => b.classList.add('active'));
    }
}

/* ---------- UPTIME COUNTER ---------- */
setInterval(() => {
    uptime++;
    if (uptime % 5 === 0) {
        addLog("System Uptime: " + uptime + "s", "info");
    }
}, 1000);

/* ---------- EVENTS ---------- */
gS.oninput = sync;
tS.oninput = sync;
</script>
