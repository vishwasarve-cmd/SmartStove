<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.8);
            --accent: #f59e0b; /* Amber */
            --danger: #ef4444; /* Rose Red */
            --success: #10b981; /* Emerald */
            --bt-blue: #3b82f6; /* Bluetooth Blue */
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.05) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* RESPONSIVE GRID LAYOUT */
        .app-container {
            display: grid;
            grid-template-columns: 350px 1fr 320px;
            width: 100vw;
            height: 100vh;
            padding: 24px;
            gap: 24px;
        }

        @media (max-width: 1200px) {
            .app-container { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .side-panel { height: auto !important; }
            .center-panel { height: 600px; }
        }

        .side-panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* SENSOR CARDS */
        .ui-group { display: flex; flex-direction: column; gap: 8px; }
        .label { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #64748b; text-transform: uppercase; }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }

        .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 600; color: var(--accent); }
        
        input[type=range] {
            width: 100%; height: 6px; appearance: none; background: #1e293b; border-radius: 10px; margin-top: 15px;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; cursor: pointer;
            box-shadow: 0 0 15px var(--accent); border: 4px solid var(--bg);
        }

        /* BLUETOOTH TOGGLE */
        .bt-toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 16px 20px;
            border-radius: 18px;
            cursor: pointer;
        }
        .bt-toggle.active { background: var(--bt-blue); border-color: #fff; }
        .bt-toggle.active .bt-icon { color: #fff; }

        .switch {
            width: 40px; height: 20px; background: #334155; border-radius: 20px; position: relative;
        }
        .switch::after {
            content: ''; position: absolute; width: 16px; height: 16px; background: #fff;
            border-radius: 50%; top: 2px; left: 2px; transition: 0.3s;
        }
        .active .switch::after { transform: translateX(20px); }

        /* SCENARIO GRID */
        .scenario-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .sc-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 14px; border-radius: 16px; cursor: pointer;
            display: flex; align-items: center; gap: 12px;
        }
        .sc-card:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); transform: translateY(-2px); }
        .sc-icon { font-size: 20px; background: #1e293b; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }

        /* CENTER VIEW */
        .center-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .knob-outer {
            width: 380px; height: 380px;
            background: radial-gradient(circle at 30% 30%, #1e293b, #020617);
            border-radius: 50%;
            border: 8px solid #0f172a;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.8);
            position: relative;
        }

        .knob-core {
            width: 280px; height: 280px;
            background: #0f172a;
            border-radius: 50%;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.4), -5px -5px 20px rgba(255,255,255,0.02);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .indicator-needle {
            width: 8px; height: 110px;
            background: linear-gradient(to top, var(--accent), #fff);
            position: absolute; top: 45px; border-radius: 10px;
            transform-origin: bottom center;
            box-shadow: 0 0 25px var(--accent);
        }

        .indicator-needle.hazard { 
            background: var(--danger); box-shadow: 0 0 30px var(--danger); 
            transform: rotate(-90deg) !important;
        }

        /* BURNERS */
        .burner-strip { display: flex; gap: 40px; margin-top: 50px; }
        .burner-base {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid #1e293b;
            display: flex; align-items: center; justify-content: center;
        }
        .fire { font-size: 28px; filter: drop-shadow(0 0 12px var(--accent)); opacity: 0; transform: scale(0.5); }
        .active .fire { opacity: 1; transform: scale(1.1); animation: flicker 0.15s infinite alternate; }

        @keyframes flicker { from { transform: scale(1) translateY(0); } to { transform: scale(1.2) translateY(-4px); } }

        /* TERMINAL */
        .log-box {
            background: #000; border-radius: 20px; padding: 20px;
            flex-grow: 1; font-family: 'JetBrains Mono', monospace;
            font-size: 11px; color: var(--success); overflow-y: auto;
            border: 1px solid var(--border);
        }

        .badge {
            margin-top: 25px; padding: 12px 35px; border-radius: 100px;
            font-weight: 800; font-size: 11px; letter-spacing: 3px;
            border: 1px solid var(--success); color: var(--success);
        }
        .badge.alert { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.1); animation: shake 0.5s infinite; }

        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }

    </style>
</head>
<body>

<div class="app-container">
    
    <aside class="side-panel">
        <div class="ui-group">
            <div class="label">Connectivity</div>
            <div class="bt-toggle" id="bt-master" onclick="toggleBT()">
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="bt-icon" style="color:var(--bt-blue)">📡</span>
                    <div style="font-size: 13px; font-weight: 600;">Bluetooth Link</div>
                </div>
                <div class="switch"></div>
            </div>
        </div>

        <div class="ui-group">
            <div class="label">Pollution Index (MQ-2)</div>
            <div class="stat-card">
                <div class="stat-val" id="g-num">120</div>
                <input type="range" id="g-slider" min="0" max="1000" value="120">
            </div>
        </div>

        <div class="ui-group">
            <div class="label">Thermal Scan (LM35)</div>
            <div class="stat-card">
                <div class="stat-val" id="t-num">28</div>
                <input type="range" id="t-slider" min="20" max="150" value="28">
            </div>
        </div>
    </aside>

    <main class="center-panel">
        <div class="knob-outer">
            <div class="indicator-needle" id="needle"></div>
            <div class="knob-core">
                <div id="core-status" style="font-weight: 800; font-size: 1.2rem; letter-spacing: 2px;">READY</div>
                <div style="font-size: 10px; color: #475569; margin-top: 5px;">ROTATION: 0°</div>
            </div>
        </div>

        <div class="badge" id="sys-badge">SYSTEM SECURE</div>

        <div class="burner-strip">
            <div class="burner-base active" id="b1"><span class="fire">🔥</span></div>
            <div class="burner-base active" id="b2"><span class="fire">🔥</span></div>
            <div class="burner-base active" id="b3"><span class="fire">🔥</span></div>
        </div>
    </main>

    <aside class="side-panel">
        <div class="ui-group">
            <div class="label">Scenario Presets</div>
            <div class="scenario-grid">
                <div class="sc-card" onclick="apply(750, 32)">
                    <div class="sc-icon">💨</div>
                    <div style="font-size: 12px; font-weight: 600;">Gas Leak Simulation</div>
                </div>
                <div class="sc-card" onclick="apply(120, 115)">
                    <div class="sc-icon">🌡️</div>
                    <div style="font-size: 12px; font-weight: 600;">Thermal Overload</div>
                </div>
                <div class="sc-card" onclick="apply(45, 26)">
                    <div class="sc-icon">🔄</div>
                    <div style="font-size: 12px; font-weight: 600;">Full System Reset</div>
                </div>
            </div>
        </div>

        <div class="ui-group" style="flex-grow: 1;">
            <div class="label">Data Stream</div>
            <div class="log-box" id="logs">
                > Initializing Modules...<br>
                > BT Ready...<br>
                > Awaiting Sensors...
            </div>
        </div>
    </aside>

</div>

<script>
    const gS = document.getElementById('g-slider');
    const tS = document.getElementById('t-slider');
    const needle = document.getElementById('needle');
    const coreStatus = document.getElementById('core-status');
    const sysBadge = document.getElementById('sys-badge');
    const logs = document.getElementById('logs');
    const btMaster = document.getElementById('bt-master');

    let isSafe = true;
    let btEnabled = false;

    function addLog(msg, isErr = false) {
        const color = isErr ? "var(--danger)" : "var(--success)";
        logs.innerHTML = `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>` + logs.innerHTML;
    }

    function toggleBT() {
        btEnabled = !btEnabled;
        btMaster.classList.toggle('active', btEnabled);
        addLog(btEnabled ? "Bluetooth: Device Connected" : "Bluetooth: Device Disconnected");
    }

    function apply(g, t) {
        gS.value = g;
        tS.value = t;
        sync();
    }

    function sync() {
        const g = parseInt(gS.value);
        const t = parseInt(tS.value);

        document.getElementById('g-num').innerText = g;
        document.getElementById('t-num').innerText = t;

        const isHazard = g > 400 || t > 80;

        if (isSafe && isHazard) {
            isSafe = false;
            needle.classList.add('hazard');
            coreStatus.innerText = "HALT";
            coreStatus.style.color = "var(--danger)";
            sysBadge.innerText = "DANGER: EMERGENCY SHUTOFF";
            sysBadge.classList.add('alert');
            document.querySelectorAll('.burner-base').forEach(b => b.classList.remove('active'));
            
            addLog("!! CRITICAL: THRESHOLD EXCEEDED !!", true);
            addLog("Executing Servo Command: -90°", true);
            if(btEnabled) addLog("Remote Alert: Dispatched to Mobile", false);
        } 
        else if (!isSafe && g < 200 && t < 45) {
            isSafe = true;
            needle.classList.remove('hazard');
            coreStatus.innerText = "READY";
            coreStatus.style.color = "#fff";
            sysBadge.innerText = "SYSTEM SECURE";
            sysBadge.classList.remove('alert');
            document.querySelectorAll('.burner-base').forEach(b => b.classList.add('active'));
            addLog("Sensors Normalized. Resuming Watch.");
        }
    }

    gS.oninput = sync;
    tS.oninput = sync;
</script>

</body>
</html>
