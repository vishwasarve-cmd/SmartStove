<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Stove Knob | Simulation Dashboard</title>
    <style>
        :root { --primary: #3b82f6; --danger: #ef4444; --success: #10b981; --dark: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #f8fafc; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; max-width: 1200px; margin: auto; }
        .panel { background: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        .knob-container { text-align: center; padding: 40px; }
        .knob { width: 180px; height: 180px; border-radius: 50%; border: 10px solid #475569; margin: auto; 
                display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800;
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .knob::before { content: ''; position: absolute; top: 15px; width: 6px; height: 50px; background: white; border-radius: 3px; }
        .on { border-color: var(--success); color: var(--success); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        .off { border-color: var(--danger); color: var(--danger); transform: rotate(-90deg); }
        .slider-box { margin-bottom: 25px; }
        input[type=range] { width: 100%; height: 8px; border-radius: 5px; appearance: none; background: #334155; outline: none; }
        .log-screen { background: #000; color: #10b981; font-family: monospace; padding: 15px; height: 200px; overflow-y: auto; border-radius: 8px; font-size: 0.85rem; }
        .badge { background: var(--primary); padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div style="text-align:center; margin-bottom: 30px;">
    <h1>Smart Auto-Off Stove Knob</h1>
    <span class="badge">CIT Department of CSE</span>
</div>

<div class="grid">
    <div class="panel">
        <h3>Device Status</h3>
        <div class="knob-container">
            <div id="knob" class="knob on">STOVE ON</div>
        </div>
        <div id="bt-box" style="text-align: center; color: #94a3b8;">
            <p>HC-05 Bluetooth: <span id="bt-stat">Scanning...</span></p>
            <button onclick="toggleBT()" style="cursor:pointer; background: var(--primary); color:white; border:none; padding:8px 20px; border-radius:5px;">Connect App</button>
        </div>
    </div>

    <div class="panel">
        <h3>Sensor Simulation (Arduino Inputs)</h3>
        
        <div class="slider-box">
            <label>MQ-2 Gas Sensor: <b id="g-val">120</b> PPM</label>
            <input type="range" id="gas" min="0" max="1000" value="120">
        </div>

        <div class="slider-box">
            <label>LM35 Temp Sensor: <b id="t-val">30</b> °C</label>
            <input type="range" id="temp" min="20" max="150" value="30">
        </div>

        <h3>System Logs</h3>
        <div id="logs" class="log-screen">> Initializing Arduino Nano...<br>> Sensors 24/7 Monitoring Active...</div>
    </div>
</div>

<script>
    const gS = document.getElementById('gas');
    const tS = document.getElementById('temp');
    const knob = document.getElementById('knob');
    const logBox = document.getElementById('logs');
    let active = true;
    let bt = false;

    function addLog(msg) {
        logBox.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + logBox.innerHTML;
    }

    function toggleBT() {
        bt = !bt;
        document.getElementById('bt-stat').innerText = bt ? "CONNECTED ✅" : "DISCONNECTED";
        addLog(bt ? "Mobile App Linked via Bluetooth" : "Bluetooth Connection Lost");
    }

    function update() {
        const gas = parseInt(gS.value);
        const temp = parseInt(tS.value);
        document.getElementById('g-val').innerText = gas;
        document.getElementById('t-val').innerText = temp;

        // LOGIC FROM PPT: Gas > 400 OR Temp > 80 [cite: 35]
        if (active && (gas > 400 || temp > 80)) {
            active = false;
            knob.classList.replace('on', 'off');
            knob.innerText = "AUTO-OFF";
            addLog("<span style='color:red'>!! HAZARD DETECTED !!</span>");
            addLog("Command: Rotating Servo Motor to 90°...");
            addLog("Buzzer: Emitting 85dB alert...");
            if(bt) addLog("App: Push Notification Sent to User");
        } else if (!active && gas < 200 && temp < 50) {
            active = true;
            knob.classList.replace('off', 'on');
            knob.innerText = "STOVE ON";
            addLog("System Status: Normal. Manual Reset Allowed.");
        }
    }

    gS.oninput = update;
    tS.oninput = update;
</script>
</body>
</html>
